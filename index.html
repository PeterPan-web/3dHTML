<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>卡通森林 3D 圆形全景</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f9fbef;
      --muted: rgba(249, 251, 239, 0.74);
      --panel: rgba(9, 31, 28, 0.78);
      --line: rgba(249, 251, 239, 0.18);
      --accent: #ffd36a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(12, 42, 40, 0.92), rgba(53, 48, 91, 0.74)),
        url("assets/cartoon-forest-morning.png") center / cover fixed;
      color: var(--ink);
      overflow: hidden;
    }

    button {
      font: inherit;
    }

    .screen {
      position: fixed;
      inset: 0;
    }

    .picker {
      display: none;
      align-content: center;
      gap: 28px;
      padding: clamp(18px, 4vw, 48px);
      background:
        radial-gradient(circle at 25% 15%, rgba(255, 211, 106, 0.16), transparent 34%),
        linear-gradient(180deg, rgba(5, 18, 22, 0.14), rgba(5, 18, 22, 0.62));
    }

    .picker-head {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 8px;
    }

    .eyebrow {
      width: max-content;
      max-width: 100%;
      padding: 6px 10px;
      border: 1px solid rgba(255, 211, 106, 0.42);
      border-radius: 999px;
      color: #ffe6a7;
      background: rgba(0, 0, 0, 0.18);
      font-size: 13px;
      line-height: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 78px);
      line-height: 0.96;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 12px 38px rgba(0, 0, 0, 0.32);
    }

    .subhead {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 19px);
      line-height: 1.65;
    }

    .choice-grid {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(14px, 2vw, 22px);
    }

    .choice {
      position: relative;
      min-width: 0;
      min-height: 0;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      color: var(--ink);
      background: #0b2525;
      box-shadow: 0 22px 52px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      aspect-ratio: 16 / 10;
      transform: translateY(0);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .choice:hover,
    .choice:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(255, 211, 106, 0.72);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.4);
      outline: none;
    }

    .choice img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .choice::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 46%, rgba(0, 0, 0, 0.76));
      pointer-events: none;
    }

    .choice span {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 13px;
      z-index: 1;
      font-size: clamp(17px, 2vw, 24px);
      font-weight: 700;
      line-height: 1.15;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.52);
      overflow-wrap: anywhere;
    }

    .viewer {
      display: none;
      background: #04100f;
    }

    .viewer.is-open {
      display: block;
    }

    .stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(12, 43, 37, 0.1), rgba(1, 9, 9, 0.48)),
        #04100f;
    }

    .stage.is-dragging {
      cursor: grabbing;
    }

    #panoCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .toolbar {
      position: fixed;
      left: clamp(12px, 2vw, 22px);
      right: clamp(12px, 2vw, 22px);
      top: clamp(12px, 2vw, 22px);
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .toolbar-group {
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(16px);
      pointer-events: auto;
    }

    #backGroup {
      display: none;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 22px;
      line-height: 1;
      transition: background 160ms ease, transform 160ms ease;
    }

    .icon-btn:hover,
    .icon-btn:focus-visible {
      background: rgba(255, 211, 106, 0.22);
      outline: 1px solid rgba(255, 211, 106, 0.42);
      transform: translateY(-1px);
    }

    .scene-name {
      align-self: stretch;
      display: grid;
      place-items: center;
      min-width: min(42vw, 220px);
      padding: 0 14px;
      color: var(--ink);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .direction-chip {
      align-self: stretch;
      display: grid;
      place-items: center;
      min-width: 62px;
      padding: 0 10px;
      border-left: 1px solid rgba(255, 255, 255, 0.12);
      color: #ffe6a7;
      font-weight: 700;
      font-size: 14px;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: none;
      place-items: center;
      background: rgba(4, 17, 17, 0.35);
      pointer-events: none;
    }

    .loading.is-visible {
      display: grid;
    }

    .character-source {
      display: none;
    }

    .character {
      position: fixed;
      left: 50%;
      top: 54%;
      z-index: 3;
      width: min(260px, 27vw);
      height: auto;
      display: block;
      transform: translate(-50%, -50%);
      object-fit: contain;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      touch-action: manipulation;
      filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.36));
      transition: opacity 120ms ease;
    }

    .companion-shape {
      position: fixed;
      left: 50%;
      top: 54%;
      z-index: 3;
      width: min(190px, 20vw);
      height: auto;
      display: block;
      transform: translate(22%, -46%);
      object-fit: contain;
      opacity: 0;
      pointer-events: none;
      filter: drop-shadow(0 16px 20px rgba(0, 0, 0, 0.28));
      transition: opacity 120ms ease;
    }

    .character.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .companion-shape.is-visible {
      opacity: 1;
    }

    .loader {
      min-width: 132px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(9, 32, 31, 0.84);
      text-align: center;
      color: #fff3cd;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .picker {
        min-height: 100%;
        position: relative;
      }

      .screen {
        min-height: 100%;
      }

      .choice-grid {
        grid-template-columns: 1fr;
      }

      .choice {
        aspect-ratio: 16 / 8;
      }

      .toolbar {
        align-items: flex-start;
      }

      .scene-name {
        min-width: 0;
        max-width: 34vw;
        font-size: 14px;
      }

      .direction-chip {
        display: none;
      }

      .icon-btn {
        width: 40px;
        height: 40px;
      }

      .character {
        top: 58%;
        width: min(220px, 52vw);
      }

      .companion-shape {
        top: 58%;
        width: min(150px, 34vw);
      }
    }
  </style>
</head>
<body>
  <main class="screen picker" id="picker">
    <section class="picker-head" aria-labelledby="pageTitle">
      <div class="eyebrow">3D Panorama</div>
      <h1 id="pageTitle">卡通森林</h1>
      <p class="subhead">选择一个森林场景，进入圆形 3D 全景空间。</p>
    </section>

    <section class="choice-grid" aria-label="森林场景">
      <button class="choice" type="button" data-pano="0">
        <img src="assets/cartoon-forest-morning.png" alt="晨光森林">
        <span>晨光森林</span>
      </button>
    </section>
  </main>

  <section class="screen viewer" id="viewer" aria-label="圆形 3D 全景">
    <div class="stage" id="stage">
      <canvas id="panoCanvas"></canvas>
    </div>

    <div class="toolbar">
      <div class="toolbar-group" id="backGroup">
        <button class="icon-btn" type="button" id="backBtn" title="返回" aria-label="返回">←</button>
      </div>
      <div class="toolbar-group">
        <button class="icon-btn" type="button" id="turnLeftBtn" title="向左切换" aria-label="向左切换">‹</button>
        <div class="scene-name" id="sceneName">卡通森林</div>
        <div class="direction-chip" id="directionName">正前</div>
        <button class="icon-btn" type="button" id="turnRightBtn" title="向右切换" aria-label="向右切换">›</button>
      </div>
      <div class="toolbar-group">
        <button class="icon-btn" type="button" id="resetBtn" title="重置" aria-label="重置">↺</button>
        <button class="icon-btn" type="button" id="fullBtn" title="全屏" aria-label="全屏">⛶</button>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="loader" id="loader">加载中</div>
    </div>
  </section>

  <video class="character-source" id="mainVideo" src="character.mp4" playsinline preload="auto"></video>
  <canvas class="character" id="mainCharacter" aria-label="点击播放动画"></canvas>
  <img class="companion-shape" id="companionShape" src="shape-companion.png" alt="">

  <script src="assets/panorama-data.js"></script>
  <script>
    const panoramas = [
      { key: "morning", name: "晨光森林", thumb: "assets/cartoon-forest-morning.png" },
      { key: "mushroom", name: "蘑菇森林", thumb: "assets/cartoon-forest-mushroom.png" },
      { key: "autumn", name: "秋天森林", thumb: "assets/cartoon-forest-autumn.png" }
    ];

    const directions = ["正前", "右前", "右侧", "右后", "后方", "左后", "左侧", "左前"];
    const stepRadians = Math.PI / 4;

    const picker = document.getElementById("picker");
    const viewer = document.getElementById("viewer");
    const stage = document.getElementById("stage");
    const canvas = document.getElementById("panoCanvas");
    const sceneName = document.getElementById("sceneName");
    const directionName = document.getElementById("directionName");
    const backBtn = document.getElementById("backBtn");
    const resetBtn = document.getElementById("resetBtn");
    const fullBtn = document.getElementById("fullBtn");
    const turnLeftBtn = document.getElementById("turnLeftBtn");
    const turnRightBtn = document.getElementById("turnRightBtn");
    const loading = document.getElementById("loading");
    const loader = document.getElementById("loader");
    const companionShape = document.getElementById("companionShape");
    const characters = [
      makeCharacter("mainVideo", "mainCharacter", 0)
    ];

    let gl;
    let program;
    let sphere;
    let texture;
    let activeScene = null;
    let directionIndex = 0;
    let yaw = 0;
    let targetYaw = 0;
    let pitch = 0;
    let targetPitch = 0;
    let dragging = false;
    let startX = 0;
    let startY = 0;
    let startYaw = 0;
    let startPitch = 0;

    function createShader(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader) || "Shader error");
      }
      return shader;
    }

    function initWebGL() {
      gl = canvas.getContext("webgl", { antialias: true, alpha: false });
      if (!gl) throw new Error("WebGL unavailable");

      const vertex = createShader(gl.VERTEX_SHADER, `
        attribute vec3 aPosition;
        attribute vec2 aTexCoord;
        uniform mat4 uProjection;
        uniform mat4 uView;
        varying vec2 vTexCoord;

        void main() {
          vTexCoord = aTexCoord;
          gl_Position = uProjection * uView * vec4(aPosition, 1.0);
        }
      `);

      const fragment = createShader(gl.FRAGMENT_SHADER, `
        precision mediump float;
        uniform sampler2D uTexture;
        varying vec2 vTexCoord;

        void main() {
          gl_FragColor = texture2D(uTexture, vTexCoord);
        }
      `);

      program = gl.createProgram();
      gl.attachShader(program, vertex);
      gl.attachShader(program, fragment);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        throw new Error(gl.getProgramInfoLog(program) || "Program error");
      }

      sphere = makeSphere(128, 64);
      texture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.disable(gl.CULL_FACE);
    }

    function makeSphere(longitudeSegments, latitudeSegments) {
      const radius = 5;
      const positions = [];
      const texCoords = [];
      const indices = [];

      for (let y = 0; y <= latitudeSegments; y += 1) {
        const v = y / latitudeSegments;
        const phi = v * Math.PI;
        const ringRadius = Math.sin(phi) * radius;
        const positionY = Math.cos(phi) * radius;

        for (let x = 0; x <= longitudeSegments; x += 1) {
          const u = x / longitudeSegments;
          const theta = u * Math.PI * 2;
          positions.push(
            Math.sin(theta) * ringRadius,
            positionY,
            Math.cos(theta) * ringRadius
          );
          texCoords.push(1 - u, 1 - v);
        }
      }

      for (let y = 0; y < latitudeSegments; y += 1) {
        for (let x = 0; x < longitudeSegments; x += 1) {
          const a = y * (longitudeSegments + 1) + x;
          const b = a + longitudeSegments + 1;
          const c = a + 1;
          const d = b + 1;
          indices.push(a, b, c, c, b, d);
        }
      }

      const positionBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

      const texCoordBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(texCoords), gl.STATIC_DRAW);

      const indexBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);

      return { positionBuffer, texCoordBuffer, indexBuffer, count: indices.length };
    }

    function makeCylinder(segments) {
      const radius = 5;
      const height = 6.8;
      const positions = [];
      const texCoords = [];
      const indices = [];

      for (let i = 0; i <= segments; i += 1) {
        const u = i / segments;
        const theta = u * Math.PI * 2;
        const x = Math.sin(theta) * radius;
        const z = Math.cos(theta) * radius;
        positions.push(x, -height / 2, z, x, height / 2, z);
        texCoords.push(1 - u, 0, 1 - u, 1);
      }

      for (let i = 0; i < segments; i += 1) {
        const a = i * 2;
        const b = a + 1;
        const c = a + 2;
        const d = a + 3;
        indices.push(a, b, c, b, d, c);
      }

      const positionBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

      const texCoordBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(texCoords), gl.STATIC_DRAW);

      const indexBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);

      return { positionBuffer, texCoordBuffer, indexBuffer, count: indices.length };
    }

    function perspective(fovDeg, aspect, near, far) {
      const f = 1 / Math.tan((fovDeg * Math.PI / 180) / 2);
      const nf = 1 / (near - far);
      return new Float32Array([
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (far + near) * nf, -1,
        0, 0, 2 * far * near * nf, 0
      ]);
    }

    function rotationY(rad) {
      const c = Math.cos(rad);
      const s = Math.sin(rad);
      return new Float32Array([
        c, 0, -s, 0,
        0, 1, 0, 0,
        s, 0, c, 0,
        0, 0, 0, 1
      ]);
    }

    function rotationX(rad) {
      const c = Math.cos(rad);
      const s = Math.sin(rad);
      return new Float32Array([
        1, 0, 0, 0,
        0, c, s, 0,
        0, -s, c, 0,
        0, 0, 0, 1
      ]);
    }

    function multiplyMatrix(a, b) {
      const out = new Float32Array(16);
      for (let col = 0; col < 4; col += 1) {
        for (let row = 0; row < 4; row += 1) {
          out[col * 4 + row] =
            a[0 * 4 + row] * b[col * 4 + 0] +
            a[1 * 4 + row] * b[col * 4 + 1] +
            a[2 * 4 + row] * b[col * 4 + 2] +
            a[3 * 4 + row] * b[col * 4 + 3];
        }
      }
      return out;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function viewMatrix(yawRad, pitchRad) {
      return multiplyMatrix(rotationX(pitchRad), rotationY(yawRad));
    }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const width = Math.max(1, Math.floor(canvas.clientWidth * dpr));
      const height = Math.max(1, Math.floor(canvas.clientHeight * dpr));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
    }

    function uploadScene(scene) {
      loading.classList.add("is-visible");
      loader.textContent = "加载中";
      const image = new Image();
      image.onload = () => {
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, image);
        loading.classList.remove("is-visible");
      };
      image.onerror = () => {
        loader.textContent = "图片未找到";
      };
      image.src = window.PANORAMA_DATA?.[scene.key] || scene.thumb;
    }

    function render() {
      requestAnimationFrame(render);
      if (!gl || !activeScene) return;
      resize();
      yaw += (targetYaw - yaw) * 0.16;
      pitch += (targetPitch - pitch) * 0.16;
      updateCharacterPositions();
      gl.clearColor(0.015, 0.06, 0.055, 1);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      gl.useProgram(program);

      const position = gl.getAttribLocation(program, "aPosition");
      gl.bindBuffer(gl.ARRAY_BUFFER, sphere.positionBuffer);
      gl.enableVertexAttribArray(position);
      gl.vertexAttribPointer(position, 3, gl.FLOAT, false, 0, 0);

      const texCoord = gl.getAttribLocation(program, "aTexCoord");
      gl.bindBuffer(gl.ARRAY_BUFFER, sphere.texCoordBuffer);
      gl.enableVertexAttribArray(texCoord);
      gl.vertexAttribPointer(texCoord, 2, gl.FLOAT, false, 0, 0);

      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, sphere.indexBuffer);
      gl.uniformMatrix4fv(gl.getUniformLocation(program, "uProjection"), false, perspective(74, canvas.width / canvas.height, 0.1, 60));
      gl.uniformMatrix4fv(gl.getUniformLocation(program, "uView"), false, viewMatrix(yaw, pitch));
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.drawElements(gl.TRIANGLES, sphere.count, gl.UNSIGNED_SHORT, 0);
    }

    function setDirection(index) {
      directionIndex = ((index % directions.length) + directions.length) % directions.length;
      targetYaw = -directionIndex * stepRadians;
      directionName.textContent = directions[directionIndex];
    }

    function openScene(index) {
      const scene = panoramas[index];
      if (!scene) return;
      activeScene = scene;
      sceneName.textContent = scene.name;
      picker.style.display = "none";
      viewer.classList.add("is-open");
      document.body.style.overflow = "hidden";
      yaw = 0;
      pitch = 0;
      targetPitch = 0;
      setDirection(0);
      uploadScene(scene);
    }

    function closeScene() {
      viewer.classList.remove("is-open");
      picker.style.display = "grid";
      document.body.style.overflow = "";
      loading.classList.remove("is-visible");
      activeScene = null;
    }

    function pointerStart(event) {
      if (!activeScene) return;
      dragging = true;
      startX = event.clientX;
      startY = event.clientY;
      startYaw = targetYaw;
      startPitch = targetPitch;
      stage.classList.add("is-dragging");
      stage.setPointerCapture(event.pointerId);
    }

    function pointerMove(event) {
      if (!dragging) return;
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;
      targetYaw = startYaw + dx * 0.006;
      targetPitch = clamp(startPitch + dy * 0.004, -Math.PI / 2 + 0.12, Math.PI / 2 - 0.12);
      yaw = targetYaw;
      pitch = targetPitch;
    }

    function pointerEnd() {
      if (!dragging) return;
      dragging = false;
      stage.classList.remove("is-dragging");
      setDirection(Math.round(-targetYaw / stepRadians));
    }

    initWebGL();
    render();

    document.querySelectorAll("[data-pano]").forEach((button) => {
      button.addEventListener("click", () => openScene(Number(button.dataset.pano)));
    });

    turnLeftBtn.addEventListener("click", () => setDirection(directionIndex - 1));
    turnRightBtn.addEventListener("click", () => setDirection(directionIndex + 1));
    resetBtn.addEventListener("click", () => {
      targetPitch = 0;
      setDirection(0);
    });
    fullBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        viewer.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    });

    stage.addEventListener("pointerdown", pointerStart);
    stage.addEventListener("pointermove", pointerMove);
    stage.addEventListener("pointerup", pointerEnd);
    stage.addEventListener("pointercancel", pointerEnd);
    window.addEventListener("resize", resize);

    window.addEventListener("keydown", (event) => {
      if (!activeScene) return;
      if (event.key === "ArrowLeft") setDirection(directionIndex - 1);
      if (event.key === "ArrowRight") setDirection(directionIndex + 1);
    });

    function makeCharacter(videoId, canvasId, angle) {
      const video = document.getElementById(videoId);
      const canvas = document.getElementById(canvasId);
      return {
        video,
        canvas,
        angle,
        context: canvas.getContext("2d", { willReadFrequently: true }),
        frameCanvas: document.createElement("canvas"),
        frameContext: null
      };
    }

    characters.forEach((character) => {
      character.frameContext = character.frameCanvas.getContext("2d", { willReadFrequently: true });
    });

    function drawCharacter(character) {
      const { video, canvas, context, frameCanvas, frameContext } = character;
      const width = video.videoWidth;
      const height = video.videoHeight;
      if (!width || !height) return;

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        frameCanvas.width = width;
        frameCanvas.height = height;
      }

      frameContext.drawImage(video, 0, 0, width, height);
      const frame = frameContext.getImageData(0, 0, width, height);
      const pixels = frame.data;
      const cornerSize = Math.max(4, Math.floor(Math.min(width, height) * 0.04));
      const background = sampleBackgroundColor(pixels, width, height, cornerSize);
      const maxDistance = 42;
      const fadeDistance = 10;
      removeConnectedBackground(pixels, width, height, background, maxDistance, fadeDistance);
      removeFootingBackground(pixels, width, height);
      context.clearRect(0, 0, width, height);
      context.putImageData(frame, 0, 0);

      if (!video.paused && !video.ended) {
        requestAnimationFrame(() => drawCharacter(character));
      }
    }

    function removeConnectedBackground(pixels, width, height, background, maxDistance, fadeDistance) {
      const visited = new Uint8Array(width * height);
      const stack = [];

      function queuePixel(x, y) {
        if (x < 0 || x >= width || y < 0 || y >= height) return;
        const pixel = y * width + x;
        if (visited[pixel]) return;
        if (!isBackgroundPixel(pixels, pixel, x, y, width, height, background, maxDistance + fadeDistance)) return;
        visited[pixel] = 1;
        stack.push(pixel);
      }

      for (let x = 0; x < width; x += 1) {
        queuePixel(x, 0);
        queuePixel(x, height - 1);
      }
      for (let y = 0; y < height; y += 1) {
        queuePixel(0, y);
        queuePixel(width - 1, y);
      }

      while (stack.length) {
        const pixel = stack.pop();
        const x = pixel % width;
        const y = Math.floor(pixel / width);
        const index = pixel * 4;
        const red = pixels[index];
        const green = pixels[index + 1];
        const blue = pixels[index + 2];
        const distance = Math.hypot(red - background.red, green - background.green, blue - background.blue);

        pixels[index + 3] = distance < maxDistance
          ? 0
          : Math.round(((distance - maxDistance) / fadeDistance) * 255);

        queuePixel(x + 1, y);
        queuePixel(x - 1, y);
        queuePixel(x, y + 1);
        queuePixel(x, y - 1);
      }
    }

    function isBackgroundPixel(pixels, pixel, x, y, width, height, background, threshold) {
      const index = pixel * 4;
      const red = pixels[index];
      const green = pixels[index + 1];
      const blue = pixels[index + 2];
      const distance = Math.hypot(red - background.red, green - background.green, blue - background.blue);
      const brightness = (red + green + blue) / 3;
      const saturation = Math.max(red, green, blue) - Math.min(red, green, blue);

      return (x < width * 0.18 && y < height * 0.12) ||
        (y > height * 0.72 && saturation < 48 && brightness > 105) ||
        distance < threshold;
    }

    function removeFootingBackground(pixels, width, height) {
      for (let y = Math.floor(height * 0.72); y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const index = (y * width + x) * 4;
          const red = pixels[index];
          const green = pixels[index + 1];
          const blue = pixels[index + 2];
          const brightness = (red + green + blue) / 3;
          const saturation = Math.max(red, green, blue) - Math.min(red, green, blue);
          if (saturation < 48 && brightness > 105) {
            pixels[index + 3] = 0;
          }
        }
      }
    }

    function sampleBackgroundColor(pixels, width, height, size) {
      const samples = [
        [0, 0],
        [width - size, 0],
        [0, height - size],
        [width - size, height - size]
      ];
      let red = 0;
      let green = 0;
      let blue = 0;
      let count = 0;

      samples.forEach(([startX, startY]) => {
        for (let y = startY; y < startY + size; y += 1) {
          for (let x = startX; x < startX + size; x += 1) {
            const index = (y * width + x) * 4;
            red += pixels[index];
            green += pixels[index + 1];
            blue += pixels[index + 2];
            count += 1;
          }
        }
      });

      return {
        red: red / count,
        green: green / count,
        blue: blue / count
      };
    }

    function normalizeAngle(angle) {
      return Math.atan2(Math.sin(angle), Math.cos(angle));
    }

    function updateCharacterPositions() {
      const halfFov = 74 * Math.PI / 360;
      characters.forEach((character) => {
        const relative = normalizeAngle(character.angle + yaw);
        const visible = Math.abs(relative) < halfFov * 0.96;
        character.canvas.classList.toggle("is-visible", visible);
        companionShape.classList.toggle("is-visible", visible);
        if (!visible) return;

        const x = 76 + (Math.tan(relative) / Math.tan(halfFov)) * 50;
        const y = 67 + (pitch / (Math.PI / 2)) * 42;
        const scale = 1 - Math.min(Math.abs(relative) / halfFov, 1) * 0.12;
        character.canvas.style.left = `${x}%`;
        character.canvas.style.top = `${y}%`;
        character.canvas.style.transform = `translate(-50%, -50%) scale(${scale})`;
        companionShape.style.left = `${x}%`;
        companionShape.style.top = `${y}%`;
        companionShape.style.transform = `translate(22%, -46%) scale(${scale})`;
      });
    }

    characters.forEach((character) => {
      character.video.addEventListener("loadeddata", () => drawCharacter(character));
      character.video.addEventListener("play", () => drawCharacter(character));
      character.video.addEventListener("seeked", () => drawCharacter(character));
      character.canvas.addEventListener("click", () => {
        if (character.video.paused) {
          character.video.play();
        } else {
          character.video.pause();
        }
      });
    });

    openScene(0);
  </script>
</body>
</html>
